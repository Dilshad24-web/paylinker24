<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Left link ring (gold) -->
  <rect x="10" y="22" width="18" height="20" rx="7" fill="none" stroke="#f59e0b" stroke-width="4.5"/>
  <!-- Right link ring (white) -->
  <rect x="36" y="22" width="18" height="20" rx="7" fill="none" stroke="white" stroke-width="4.5" opacity="0.9"/>
  <!-- Connecting bar -->
  <rect x="28" y="29" width="8" height="5" rx="2.5" fill="#f59e0b"/>
